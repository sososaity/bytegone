name: Feature Request
description: Suggest an idea for Bytegone
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: What problem are you trying to solve?
      description: A clear description of the problem or limitation.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the solution you'd like
      description: What should happen?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features?
  - type: textarea
    attributes:
      label: Additional context
      description: Screenshots, references, or mockups.
