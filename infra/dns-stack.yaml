AWSTemplateFormatVersion: '2010-09-09'
Description: Bytegone Route 53 hosted zone (Phase 1) — create DNS zone first so ACM can validate.

Parameters:
  DomainName:
    Type: String
    Default: bytegone.app
    Description: Apex domain for the landing page

Resources:
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

Outputs:
  HostedZoneId:
    Description: Route 53 Hosted Zone ID
    Value: !Ref HostedZone

  Nameservers:
    Description: Update your domain registrar with these NS records
    Value: !Join [", ", !GetAtt HostedZone.NameServers]
